name: Deploy production

# Runs after a successful test on `main` (push or merged PR), or when you click
# Actions → Deploy production → Run workflow. CI on `dev` does not touch EC2.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci


      - name: Test
        env:
          MONGO_URI: ${{ secrets.TEST_MONGO_URI || secrets.MONGO_URI }}
          TEST_MONGO_URI: ${{ secrets.TEST_MONGO_URI || secrets.MONGO_URI }}
        run: npm test

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_APP_DIR }}"
            echo "Deploy dir: $(pwd)"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            echo "Deployed commit: $(git rev-parse --short HEAD)"
            npm ci --omit=dev
            pm2 restart "${{ secrets.PM2_APP_NAME }}" || pm2 start server.js --name "${{ secrets.PM2_APP_NAME }}"
            pm2 save
